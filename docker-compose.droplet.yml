services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: calypso
      POSTGRES_USER: calypso_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - calypso_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calypso_user -d calypso"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-3001}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "${PORT:-3001}"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
      PORT: ${PORT:-3001}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.droplet:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  calypso_pg:
  caddy_data:
  caddy_config:
